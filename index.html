<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sarangbar</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./style.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-screen text-slate-100 font-sans pb-20 bg-slate-950 relative" id="app-body">

  <div class="fixed inset-0 z-0 flex justify-center overflow-hidden pointer-events-none">
    <div id="desktop-ambient-bg" class="absolute inset-0 bg-cover bg-center opacity-30 blur-3xl scale-110 transition-all duration-700"></div>
    <div id="mobile-bg-layer" class="w-full max-w-md h-full bg-dark-pattern bg-cover bg-center transition-all duration-700 shadow-[0_0_50px_rgba(0,0,0,0.5)] border-x border-white/5"></div>
  </div>

  <main class="max-w-md mx-auto pt-12 px-6 relative z-10">
    <div id="profile-tilt-wrapper" class="relative group z-10 will-change-transform transition-all duration-500 ease-out">
      <div id="profile-glow" class="absolute -inset-[2px] rounded-[1.6rem] blur-[3px] opacity-70 group-hover:opacity-100 transition-all duration-500"></div>
      <div id="profile-card" class="backdrop-blur-xl shadow-2xl rounded-3xl p-6 relative h-full w-full border">
        
        <div id="cloud-status" class="absolute top-4 left-4 text-[10px] font-bold text-amber-400 bg-amber-400/10 px-3 py-1.5 rounded-full border border-amber-400/20 backdrop-blur-md flex items-center gap-1.5 transition-opacity duration-300">
          <i data-lucide="cloud-lightning" class="w-3 h-3"></i> Syncing...
        </div>

        <div class="absolute top-4 right-4 flex gap-2 z-20">
          <button id="btn-share" onclick="window.shareProfile()" class="p-2 bg-indigo-500/80 hover:bg-indigo-600 rounded-full shadow-sm text-white transition-colors backdrop-blur-md hidden" title="Bagikan Profil ke Publik">
            <i data-lucide="share-2" class="w-4 h-4"></i>
          </button>
          <button id="btn-settings" onclick="window.openSettings()" class="p-2 bg-white/10 hover:bg-white/20 rounded-full shadow-sm text-white/70 hover:text-white transition-colors backdrop-blur-md hidden" title="Pengaturan">
            <i data-lucide="settings" class="w-4 h-4"></i>
          </button>
        </div>

        <div class="flex flex-col items-center text-center space-y-4 pointer-events-none mt-2">
          <div class="relative group/avatar">
            <div class="absolute inset-0 bg-indigo-500/30 blur-xl rounded-full scale-110"></div>
            <div class="relative w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-indigo-400 via-cyan-400 to-emerald-400 shadow-lg">
              <img id="display-avatar" src="" alt="Profile" class="w-full h-full object-cover rounded-full border-[3px] border-slate-900 bg-slate-800" />
            </div>
          </div>
          <div>
            <h1 id="display-name" class="text-2xl font-extrabold text-white tracking-tight drop-shadow-sm">Memuat...</h1>
            <p id="display-bio" class="text-sm text-slate-200 mt-2 max-w-xs mx-auto leading-relaxed font-medium">Harap tunggu, memuat profil...</p>
          </div>
        </div>
      </div>
    </div>

    <div id="socials-container" class="flex flex-wrap justify-center gap-3 mt-6 px-4"></div>

    <div id="categories-wrapper" class="mt-8 hidden animate-in fade-in duration-500">
      <div id="categories-container" class="flex gap-2.5 overflow-x-auto no-scrollbar pb-2 snap-x px-1"></div>
    </div>

    <div class="mt-6 space-y-4">
      <button id="btn-add-link" onclick="window.addNewLink()" class="hidden w-full py-4 border-2 border-dashed border-slate-600/50 text-slate-300 rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-800/50 hover:border-slate-400 transition-all font-medium backdrop-blur-sm shadow-lg">
        <i data-lucide="plus" class="w-5 h-5"></i> Tambah Tautan Baru
      </button>
      <div id="links-container" class="space-y-4 mt-6"></div>
    </div>
  </main>

  <footer class="mt-24 pb-12 text-center relative z-10 flex justify-center">
    <a href="https://saweria.co/butoable" target="_blank" rel="noopener noreferrer" class="group relative inline-flex items-center gap-3 px-8 py-4 bg-slate-900/60 backdrop-blur-xl border border-white/10 rounded-full hover:bg-slate-800/80 transition-all duration-500 hover:scale-[1.03] hover:-translate-y-1 hover:shadow-[0_0_40px_rgba(245,158,11,0.25)] overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 via-amber-500/10 to-amber-500/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 blur-md"></div>
      <div class="relative flex h-4 w-4 items-center justify-center">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-60"></span>
        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500"></span>
      </div>
      <span class="relative font-bold text-slate-200 tracking-wide text-sm group-hover:text-amber-300 transition-colors">
        Support tipis-tipis ngab 🚀
      </span>
    </a>
  </footer>

  <div id="toast-message" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl border border-slate-700 opacity-0 translate-y-4 pointer-events-none transition-all duration-300 z-50 font-medium text-sm flex items-center gap-2">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
    <span>Notifikasi</span>
  </div>

  <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
    <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]" id="settings-modal-content">
      
      <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/50 flex-shrink-0">
        <h2 class="font-bold text-white text-lg">Pengaturan</h2>
        <button onclick="window.closeSettings()" class="p-1.5 text-slate-400 hover:bg-slate-700 hover:text-white rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>

      <div class="flex border-b border-slate-800 bg-slate-900/50 flex-shrink-0">
        <button onclick="window.switchModalTab('profile')" id="tab-btn-profile" class="flex-1 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-400 transition-colors">Profil Utama</button>
        <button onclick="window.switchModalTab('socials')" id="tab-btn-socials" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-300 transition-colors">Media Sosial</button>
      </div>
      
      <div class="overflow-y-auto p-6 flex-grow">
        <div id="tab-content-profile" class="space-y-5 block animate-in fade-in slide-in-from-left-2 duration-300">
          
          <div class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-2xl flex items-center justify-between">
            <div>
              <h3 class="text-sm font-bold text-indigo-300 mb-0.5">Akun Penyimpanan</h3>
              <p id="account-status-text" class="text-[10px] text-slate-400">Anonim (Tamu)</p>
            </div>
            <button id="btn-google-login" onclick="window.loginWithGoogle()" class="px-4 py-2 bg-white text-slate-900 text-xs font-bold rounded-full hover:bg-slate-200 transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(255,255,255,0.2)]">
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Login
            </button>
            <button id="btn-logout" onclick="window.logoutAccount()" class="hidden px-4 py-2 bg-rose-500/10 text-rose-400 border border-rose-500/30 text-xs font-bold rounded-full hover:bg-rose-500/20 transition-all">
              Logout
            </button>
          </div>
          <hr class="border-slate-800">

          <div>
            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Background / Tema Latar</label>
            <div class="flex items-center gap-3">
              <button onclick="document.getElementById('bg-upload').click()" class="flex-1 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm font-medium hover:bg-slate-700 flex justify-center items-center gap-2">
                <i data-lucide="image" class="w-4 h-4"></i> Unggah Background
              </button>
              <button onclick="window.resetBackground()" class="p-2 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 text-slate-400 hover:text-rose-400"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
            </div>
            <input type="file" id="bg-upload" class="hidden" accept="image/*" onchange="window.handleImageUpload(this, 1080, window.updateBackgroundData, true)">
          </div>
          <hr class="border-slate-800">
          
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Foto Profil</label>
            <div class="flex gap-3 items-center">
              <div class="w-12 h-12 rounded-full bg-slate-800 overflow-hidden flex-shrink-0 border border-slate-700">
                <img id="edit-avatar-preview" src="" alt="preview" class="w-full h-full object-cover" />
              </div>
              <button onclick="document.getElementById('avatar-upload').click()" class="flex-grow py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm hover:bg-slate-700 text-white">Pilih Foto</button>
              <input type="file" id="avatar-upload" class="hidden" accept="image/*" onchange="window.handleImageUpload(this, 300, window.updateAvatarData)">
            </div>
          </div>
          
          <div><label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Nama Tampilan</label><input type="text" id="edit-name" class="w-full px-3 py-2.5 bg-slate-800 border border-slate-700 text-white rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
          <div><label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Bio / Deskripsi</label><textarea id="edit-bio" rows="3" class="w-full px-3 py-2.5 bg-slate-800 border border-slate-700 text-white rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea></div>
          <hr class="border-slate-800">
          <div><label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Tema Kartu Profil</label><div id="profile-theme-options" class="flex flex-wrap gap-3"></div></div>
        </div>

        <div id="tab-content-socials" class="hidden animate-in fade-in slide-in-from-right-2 duration-300">
          <button onclick="window.addNewSocial()" class="w-full py-3 border border-indigo-500/50 bg-indigo-500/10 text-indigo-400 rounded-xl flex items-center justify-center gap-2 hover:bg-indigo-500/20 transition-all font-medium mb-4">
            <i data-lucide="plus" class="w-4 h-4"></i> Tambah Media Sosial
          </button>
          <div id="social-settings-list" class="space-y-3"></div>
        </div>
      </div>

      <div id="modal-footer-save" class="p-4 bg-slate-800/50 border-t border-slate-800 flex-shrink-0">
        <button onclick="window.saveProfileSettings()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold shadow-md shadow-indigo-900/50 hover:bg-indigo-500 hover:shadow-lg transition-all">Simpan Profil</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Penyesuaian path agar lebih aman di GitHub Pages
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker aktif!', reg))
          .catch(err => console.error('Service Worker gagal dipasang: ', err));
      });
    }
  </script>
  
  <script type="module" src="./app.js"></script>
</body>
</html>
